{% extends "challenge.html" %}

{% block input %}
<input id="challenge-id" class="challenge-id" type="hidden" value="{{ challenge.id }}">

<style>
/* ─── s3 challenge submission modal — Direction D ─── */
#econ-submit-root {
  font-family: var(--d-f-ko, 'Pretendard Variable', sans-serif);
  color: var(--d-ink, #15110a);
  line-height: 1.55;
  font-feature-settings: 'tnum' on;
}

#econ-submit-root [data-state][hidden] { display: none; }

/* ── Dropzone (empty) ───────────────────────────────────────── */
#econ-submit-root .dropzone {
  display: block;
  position: relative;
  border: 1.5px dashed var(--d-brand-line, rgba(245,168,61,0.32));
  border-radius: 8px;
  background: var(--d-paper, #fbfaf6);
  padding: 36px 24px 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
}
#econ-submit-root .dropzone:hover {
  background: var(--d-brand-soft, #fff4e0);
  border-color: var(--d-brand, #f5a83d);
}
#econ-submit-root .dropzone.is-active {
  background: var(--d-brand-soft, #fff4e0);
  border-color: var(--d-brand-dark, #d69336);
  border-style: solid;
  transform: scale(0.998);
}
#econ-submit-root .dropzone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
#econ-submit-root .dropzone .glyph {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--d-ink, #15110a);
  color: var(--d-paper, #fbfaf6);
  margin-bottom: 12px;
}
#econ-submit-root .dropzone .glyph svg { display: block; }
#econ-submit-root .dropzone .headline {
  font-family: var(--d-f-ko);
  font-size: 14.5px;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--d-ink);
  margin-bottom: 6px;
  line-height: 1.5;
}
#econ-submit-root .dropzone .headline em {
  font-family: var(--d-f-mono);
  font-style: normal;
  background: var(--d-brand-soft);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--d-brand-ink);
  font-size: 0.92em;
}
#econ-submit-root .dropzone .subline {
  font-family: var(--d-f-ko);
  font-size: 12.5px;
  color: var(--d-ink-light);
  letter-spacing: -0.005em;
  margin-bottom: 12px;
}
#econ-submit-root .dropzone::after {
  content: '≤ 256 KB · COMBINATIONAL ONLY';
  display: block;
  font-family: var(--d-f-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--d-ink-light);
  text-transform: uppercase;
  padding-top: 12px;
  border-top: 1px dashed var(--d-hair);
  margin: 12px 16px 0;
}

#econ-submit-root .file-error {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 6px;
  background: var(--d-fail-soft, #fbece3);
  border: 1px solid var(--d-fail-line, #ecbeb0);
  font-family: var(--d-f-ko);
  font-size: 13px;
  color: var(--d-fail, #b04a3a);
  text-align: center;
}

/* ── File card (ready) ──────────────────────────────────────── */
#econ-submit-root .filecard {
  display: flex;
  align-items: center;
  gap: 14px;
  border: 1px solid var(--d-brand-line);
  background: var(--d-brand-soft);
  border-radius: 6px;
  padding: 12px 14px;
}
#econ-submit-root .filecard .badge {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 6px;
  background: var(--d-brand);
  color: var(--d-ink);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--d-f-mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
#econ-submit-root .filecard .meta { flex: 1; min-width: 0; }
#econ-submit-root .filecard .name {
  font-family: var(--d-f-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--d-ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#econ-submit-root .filecard .size {
  margin-top: 2px;
  font-family: var(--d-f-mono);
  font-size: 11px;
  color: var(--d-brand-ink);
  letter-spacing: 0.02em;
}
#econ-submit-root .filecard .clear {
  flex-shrink: 0;
  background: transparent;
  border: 0;
  width: 26px;
  height: 26px;
  border-radius: 4px;
  cursor: pointer;
  color: var(--d-brand-ink);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 150ms ease, color 150ms ease;
}
#econ-submit-root .filecard .clear:hover {
  background: var(--d-paper-sunk);
  color: var(--d-ink);
}

/* ── Grading state ──────────────────────────────────────────── */
#econ-submit-root .grading {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border-radius: 6px;
  background: var(--d-paper-soft);
  border: 1px solid var(--d-hair-strong);
}
#econ-submit-root .grading .spinner {
  width: 24px;
  height: 24px;
  border: 2.5px solid var(--d-brand-line);
  border-top-color: var(--d-brand-dark);
  border-radius: 50%;
  animation: econ-spin 780ms linear infinite;
  flex-shrink: 0;
}
#econ-submit-root .grading .copy {
  font-family: var(--d-f-ko);
  font-size: 14.5px;
  font-weight: 600;
  color: var(--d-ink);
}
#econ-submit-root .grading .copy .sub {
  display: block;
  margin-top: 2px;
  font-family: var(--d-f-ko);
  font-size: 12.5px;
  font-weight: 400;
  color: var(--d-ink-light);
}
@keyframes econ-spin { to { transform: rotate(360deg); } }

/* ── Result panel ───────────────────────────────────────────── */
#econ-submit-root .result {
  border-radius: 8px;
  border: 1px solid var(--d-hair);
  padding: 16px 18px 14px;
  background: var(--d-paper);
}
#econ-submit-root .result.is-pass    { background: var(--d-pass-soft, #e6f1e7); border-color: var(--d-pass-line, #b9d6bf); }
#econ-submit-root .result.is-partial { background: var(--d-warn-soft, #fff4dd); border-color: var(--d-warn-line, #e9c98c); }
#econ-submit-root .result.is-fail    { background: var(--d-fail-soft, #fbece3); border-color: var(--d-fail-line, #ecbeb0); }

#econ-submit-root .result .head {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
#econ-submit-root .result .marker {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
#econ-submit-root .result.is-pass    .marker { background: var(--d-pass, #2e7d52); }
#econ-submit-root .result.is-partial .marker { background: var(--d-warn, #a8761d); }
#econ-submit-root .result.is-fail    .marker { background: var(--d-fail, #b04a3a); }
#econ-submit-root .result .text { flex: 1; min-width: 0; }
#econ-submit-root .result .title {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: var(--d-f-ko);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--d-ink);
}
#econ-submit-root .result .title .count {
  font-family: var(--d-f-sans);
  font-weight: 600;
  font-feature-settings: 'tnum';
  font-size: 20px;
  letter-spacing: -0.01em;
}
#econ-submit-root .result.is-pass    .title .count { color: var(--d-pass); }
#econ-submit-root .result.is-partial .title .count { color: var(--d-warn); }
#econ-submit-root .result.is-fail    .title .count { color: var(--d-fail); }
#econ-submit-root .result .subtitle {
  margin-top: 4px;
  font-family: var(--d-f-ko);
  font-size: 13px;
  color: var(--d-ink-mid);
  line-height: 1.5;
}
#econ-submit-root .result .bar {
  margin-top: 14px;
  height: 4px;
  background: rgba(21, 17, 10, 0.08);
  border-radius: 2px;
  overflow: hidden;
}
#econ-submit-root .result .bar > i {
  display: block;
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 700ms cubic-bezier(0.22, 0.61, 0.36, 1);
}
#econ-submit-root .result.is-pass    .bar > i { background: var(--d-pass); }
#econ-submit-root .result.is-partial .bar > i { background: var(--d-warn); }
#econ-submit-root .result.is-fail    .bar > i { background: var(--d-fail); }

#econ-submit-root .result details {
  margin-top: 12px;
}
#econ-submit-root .result details summary {
  cursor: pointer;
  font-family: var(--d-f-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--d-ink-light);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  user-select: none;
  list-style: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 0;
}
#econ-submit-root .result details summary::-webkit-details-marker { display: none; }
#econ-submit-root .result details summary::before {
  content: '▸';
  font-size: 8px;
  transition: transform 150ms ease;
}
#econ-submit-root .result details[open] summary::before { transform: rotate(90deg); }
#econ-submit-root .result details summary:hover { color: var(--d-ink); }
#econ-submit-root .result details pre {
  margin: 8px 0 0;
  padding: 10px 12px;
  background: var(--d-paper);
  border: 1px solid var(--d-hair);
  border-radius: 4px;
  font-family: var(--d-f-mono);
  font-size: 10.5px;
  line-height: 1.5;
  max-height: 200px;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--d-ink);
}

#econ-submit-root .resubmit {
  margin-top: 12px;
  width: 100%;
  padding: 10px 16px;
  background: transparent;
  border: 1px solid var(--d-hair-strong);
  color: var(--d-ink);
  border-radius: 999px;
  font-family: var(--d-f-sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 150ms ease, border-color 150ms ease;
  letter-spacing: -0.005em;
}
#econ-submit-root .resubmit:hover {
  background: var(--d-paper-soft);
  border-color: var(--d-ink);
}
</style>

<div id="econ-submit-root">
  <!-- 1: empty -->
  <div data-state="empty">
    <label class="dropzone" id="econ-dropzone">
      <input type="file" id="challenge-file" accept=".dig">
      <span class="glyph" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 3 14 9 20 9"/>
          <line x1="12" y1="13" x2="12" y2="19"/>
          <polyline points="9 16 12 19 15 16"/>
        </svg>
      </span>
      <div class="headline"><em>.dig</em> 파일을 끌어다 놓거나 클릭해서 선택</div>
      <div class="subline">Digital 시뮬레이터로 작성한 회로 파일</div>
    </label>
    <div class="file-error" id="econ-file-error" hidden></div>
  </div>

  <!-- 2: ready -->
  <div data-state="ready" hidden>
    <div class="filecard">
      <div class="badge">.dig</div>
      <div class="meta">
        <div class="name" id="econ-file-name"></div>
        <div class="size" id="econ-file-size"></div>
      </div>
      <button class="clear" id="econ-file-clear" type="button" aria-label="파일 제거">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 3: grading -->
  <div data-state="grading" hidden>
    <div class="grading">
      <span class="spinner" aria-hidden="true"></span>
      <span class="copy">채점 중<span class="sub">Digital 시뮬레이터로 회로를 검증하고 있습니다 · 평균 2–5초</span></span>
    </div>
  </div>

  <!-- 4: result -->
  <div data-state="result" hidden>
    <div class="result" id="econ-result"></div>
    <button class="resubmit" id="econ-resubmit" type="button">다시 제출하기</button>
  </div>
</div>
{% endblock %}
